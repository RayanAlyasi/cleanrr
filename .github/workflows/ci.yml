name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    env:
      # Promoted to job env so the "Upload coverage" step can branch on it
      # in its `if:` (secrets aren't accessible to if expressions directly).
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Format
        run: ruff format --check .

      - name: Types
        run: pyright

      - name: Security (bandit)
        run: bandit -r cleanrr/ -ll

      - name: Tests
        run: pytest -v --cov=cleanrr --cov-report=xml

      - name: Upload coverage
        if: matrix.python-version == '3.13' && env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v7
        with:
          fail_ci_if_error: false

  duplicates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Check for duplicate code (jscpd)
        run: npx --yes jscpd@latest ./cleanrr
