services:
  cleanrr:
    build: .
    container_name: cleanrr
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    networks:
      - media
    # Uncomment to expose Prometheus metrics endpoint to the host
    # (also set METRICS_ENABLED=true in .env)
    # ports:
    #   - "9100:9100"

networks:
  media:
    name: ${DOCKER_NETWORK_NAME:-media}
    external: true
